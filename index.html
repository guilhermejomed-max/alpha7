<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNews - Inovação e Tecnologia</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <style>
        :root { 
            --wa-green: #075E54; --wa-bg: #f0f2f5; 
            --accent: #00ff41; --dark: #121212;
        }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--wa-bg); overflow: hidden; }
        .hidden { display: none !important; }

        /* PORTAL */
        header.portal-header { background: #fff; padding: 15px 25px; border-bottom: 3px solid #0056b3; display: flex; justify-content: space-between; align-items: center; }
        #search-trigger { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; }

        /* PERFIL */
        #profile-setup { position: fixed; inset: 0; background: var(--dark); color: white; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .profile-card { background: #1e1e1e; padding: 30px; border-radius: 20px; text-align: center; width: 320px; }
        .av-circle { width: 45px; height: 45px; border-radius: 50%; background: #2a2a2a; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; margin: 5px; border: 2px solid transparent; }
        .av-circle.active { border-color: var(--accent); }
        .input-profile { background: #2a2a2a; border: none; padding: 12px; color: white; border-radius: 10px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }

        /* MENU DE CONVERSAS */
        #chat-menu { position: fixed; inset: 0; background: #fff; z-index: 9998; display: flex; flex-direction: column; }
        .menu-header { background: var(--wa-green); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .chat-item-icon { width: 50px; height: 50px; background: #ece5dd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        
        /* BOTÃO FLUTUANTE */
        .fab { position: fixed; bottom: 30px; right: 30px; background: #25D366; color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* CHAT AREA */
        #chat-app { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; background: #e5ddd5; }
        .chat-nav { background: var(--wa-green); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        #messages-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 8px 12px; border-radius: 8px; max-width: 75%; font-size: 14.5px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; background: #fff; }
        footer { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; }
        #msg-input { flex: 1; border: none; padding: 12px; border-radius: 25px; outline: none; }
    </style>
</head>
<body>

    <div id="news-portal">
        <header class="portal-header">
            <div style="color:#0056b3; font-weight:bold;">Alpha 7 Tech</div>
            <input type="text" id="search-trigger" placeholder="Buscar no portal...">
        </header>
        <div style="padding: 20px; max-width: 600px; margin: auto; opacity: 0.5;">
            <h3>Destaques de hoje</h3>
            <div style="background:#fff; height:100px; margin-bottom:10px;"></div>
            <div style="background:#fff; height:100px;"></div>
        </div>
    </div>

    <div id="profile-setup" class="hidden">
        <div class="profile-card">
            <div id="setup-av-view" style="font-size: 50px; margin-bottom: 15px;">👤</div>
            <div class="avatar-options">
                <span class="av-circle active" data-icon="👤">👤</span>
                <span class="av-circle" data-icon="🦊">🦊</span>
                <span class="av-circle" data-icon="🕵️">🕵️</span>
                <span class="av-circle" data-icon="🤖">🤖</span>
            </div>
            <input type="text" id="user-nick" class="input-profile" placeholder="Seu apelido...">
            <button onclick="finalizeSetup()" style="background:var(--accent); border:none; padding:12px; width:100%; border-radius:10px; cursor:pointer; font-weight:bold;">CADASTRAR</button>
        </div>
    </div>

    <div id="chat-menu" class="hidden">
        <div class="menu-header">
            <span>Minhas Conversas</span>
            <small id="user-display-id" style="font-size: 10px; opacity: 0.7;"></small>
        </div>
        <div class="chat-list" id="chat-list-container"></div>
        <button class="fab" onclick="promptRoomKey()">+</button>
    </div>

    <div id="chat-app" class="hidden">
        <div class="chat-nav">
            <span style="cursor:pointer;" onclick="closeChat()">←</span>
            <div id="active-room-name" style="font-weight:bold;">Sala</div>
        </div>
        <div id="messages-flow"></div>
        <footer>
            <input type="text" id="msg-input" placeholder="Mensagem...">
            <button onclick="sendMsg()" style="border:none; background:none; font-size:24px; cursor:pointer;">➤</button>
        </footer>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDpDQ1QP1rpud61JzG5oO_EIQZg_imG7fE",
            authDomain: "alpha-7-2aefe.firebaseapp.com",
            databaseURL: "https://alpha-7-2aefe-default-rtdb.firebaseio.com",
            projectId: "alpha-7-2aefe",
            storageBucket: "alpha-7-2aefe.firebasestorage.app",
            messagingSenderId: "732540803197",
            appId: "1:732540803197:web:c459e86c800a4f960ff914"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let MASTER_KEY = "";
        let USER_DATA = { icon: "👤", name: "" };
        let ACTIVE_ROOM_ID = "";

        // LOGIN
        document.getElementById('search-trigger').onkeypress = function(e) {
            if(e.key === 'Enter') {
                MASTER_KEY = e.target.value;
                if(MASTER_KEY.length < 3) return;
                
                db.ref('alpha7/users/' + MASTER_KEY).once('value', snap => {
                    if(snap.exists()) {
                        USER_DATA = snap.val();
                        openMenu();
                    } else {
                        document.getElementById('news-portal').classList.add('hidden');
                        document.getElementById('profile-setup').classList.remove('hidden');
                    }
                });
            }
        };

        // SETUP PERFIL
        document.querySelectorAll('.av-circle').forEach(el => {
            el.onclick = () => {
                document.querySelectorAll('.av-circle').forEach(a => a.classList.remove('active'));
                el.classList.add('active');
                USER_DATA.icon = el.dataset.icon;
                document.getElementById('setup-av-view').innerText = USER_DATA.icon;
            };
        });

        function finalizeSetup() {
            USER_DATA.name = document.getElementById('user-nick').value;
            if(!USER_DATA.name) return;
            db.ref('alpha7/users/' + MASTER_KEY).set(USER_DATA);
            openMenu();
        }

        // GESTÃO DE CHAVES DE CONVERSA
        function openMenu() {
            document.getElementById('news-portal').classList.add('hidden');
            document.getElementById('profile-setup').classList.add('hidden');
            document.getElementById('chat-menu').classList.remove('hidden');
            document.getElementById('user-display-id').innerText = "Sua ID: " + MASTER_KEY;
            refreshRooms();
        }

        function promptRoomKey() {
            const roomKey = prompt("Insira a CHAVE da conversa (Ex: SALA-123):");
            if(!roomKey) return;
            
            // Vincula esta chave à sua MASTER_KEY no Firebase
            db.ref('alpha7/user_rooms/' + MASTER_KEY + '/' + roomKey).set(true);
            refreshRooms();
        }

        function refreshRooms() {
            const container = document.getElementById('chat-list-container');
            container.innerHTML = "";
            
            db.ref('alpha7/user_rooms/' + MASTER_KEY).once('value', snap => {
                if(!snap.exists()) {
                    container.innerHTML = "<p style='text-align:center; padding:20px; color:#999;'>Sem conversas vinculadas.</p>";
                    return;
                }
                snap.forEach(child => {
                    const roomId = child.key;
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.onclick = () => loadChat(roomId);
                    div.innerHTML = `
                        <div class="chat-item-icon">🔑</div>
                        <div><strong>Chave: ${roomId}</strong><br><small>Toque para entrar no túnel</small></div>
                    `;
                    container.appendChild(div);
                });
            });
        }

        // CHAT REAL-TIME
        function loadChat(roomId) {
            ACTIVE_ROOM_ID = roomId;
            document.getElementById('chat-menu').classList.add('hidden');
            document.getElementById('chat-app').classList.remove('hidden');
            document.getElementById('active-room-name').innerText = "Túnel: " + roomId;
            document.getElementById('messages-flow').innerHTML = "";
            
            db.ref('alpha7/messages/' + ACTIVE_ROOM_ID).off();
            listenMessages();
        }

        function listenMessages() {
            db.ref('alpha7/messages/' + ACTIVE_ROOM_ID).on('child_added', snap => {
                try {
                    const bytes = CryptoJS.AES.decrypt(snap.val(), ACTIVE_ROOM_ID); // Usa a própria chave da sala para criptografar
                    const dec = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
                    renderBubble(dec);
                } catch(e) { }
            });
        }

        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(!inp.value) return;

            const data = { sender: USER_DATA.name, icon: USER_DATA.icon, text: inp.value };
            // Criptografamos usando a chave da sala como senha
            const encrypted = CryptoJS.AES.encrypt(JSON.stringify(data), ACTIVE_ROOM_ID).toString();
            
            db.ref('alpha7/messages/' + ACTIVE_ROOM_ID).push(encrypted);
            inp.value = "";
        }

        function renderBubble(data) {
            const flow = document.getElementById('messages-flow');
            const type = (data.sender === USER_DATA.name) ? 'sent' : 'received';
            const div = document.createElement('div');
            div.className = `bubble ${type}`;
            div.innerHTML = `<small style="color:var(--wa-green); font-weight:bold">${data.icon} ${data.sender}</small><br>${data.text}`;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        function closeChat() {
            document.getElementById('chat-app').classList.add('hidden');
            document.getElementById('chat-menu').classList.remove('hidden');
            db.ref('alpha7/messages/' + ACTIVE_ROOM_ID).off();
        }

        document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };
        window.onkeydown = (e) => { if(e.key === "Escape") location.reload(); };
    </script>
</body>
</html>
